name: LinkedIn Scan Timely

on:
  schedule:
    - cron: "15 16 * * 1-5"
    - cron: "15 21 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without writing calendar state"
        required: false
        default: "true"
      mode:
        description: "Provider mode: fixture or live"
        required: false
        default: "fixture"

concurrency:
  group: linkedin-scan-timely
  cancel-in-progress: false

jobs:
  timely:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Scan timely opportunities
        env:
          SOCIAL_PROVIDER_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode || 'live' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ]; then
            npm run social:scan-timely -- --dry-run
          else
            npm run social:scan-timely
          fi
      - name: Commit updated state
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add social/calendar social/state
          git commit -m "chore: refresh linkedin timely queue"
          git push
