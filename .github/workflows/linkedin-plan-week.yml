name: LinkedIn Plan Week

on:
  schedule:
    - cron: "5 16 * * 0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without writing calendar state"
        required: false
        default: "true"
      mode:
        description: "Provider mode: fixture or live"
        required: false
        default: "fixture"

concurrency:
  group: linkedin-plan-week
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Plan week
        env:
          SOCIAL_PROVIDER_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode || 'live' }}
        run: |
          if [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ]; then
            npm run social:plan-week -- --dry-run
          else
            npm run social:plan-week
          fi
      - name: Commit updated state
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add social/calendar social/state
          git commit -m "chore: refresh linkedin weekly calendar"
          git push
