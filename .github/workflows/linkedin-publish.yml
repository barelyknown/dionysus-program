name: LinkedIn Publish Due

on:
  schedule:
    - cron: "40 12 * * 1-5"
    - cron: "40 13 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without publishing or writing history"
        required: false
        default: "true"
      mode:
        description: "Provider mode: fixture or live"
        required: false
        default: "fixture"
      now:
        description: "Optional ISO timestamp override for due-item checks"
        required: false
        default: ""

concurrency:
  group: linkedin-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Install pandoc
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
      - name: Publish due posts
        env:
          SOCIAL_PROVIDER_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode || 'live' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ZAPIER_LINKEDIN_WEBHOOK_URL: ${{ secrets.ZAPIER_LINKEDIN_WEBHOOK_URL }}
        run: |
          if [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ]; then
            if [ -n "${{ github.event.inputs.now }}" ]; then
              npm run social:publish-due -- --dry-run --now "${{ github.event.inputs.now }}"
            else
              npm run social:publish-due -- --dry-run
            fi
          else
            if [ -n "${{ github.event.inputs.now }}" ]; then
              npm run social:publish-due -- --now "${{ github.event.inputs.now }}"
            else
              npm run social:publish-due
            fi
          fi
      - name: Rebuild website
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true' }}
        run: npm run build:site
      - name: Commit updated state
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true' }}
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add social/calendar social/history social/state content/notes notes index.html praise.html dist/praise.md dist/praise-rotator.yaml dist/notes-teaser.yaml dist/letters-to-editor.md dist/letters-to-editor-appendix.md dist/appendix-index.md
          git commit -m "chore: update linkedin publish state and site"
          git push
